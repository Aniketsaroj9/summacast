name: SummaCast CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  backend-ci:
    name: Backend CI (Python)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Verify Python Code Compilation
        run: |
          python -m py_compile backend/db.py backend/main.py backend/models.py backend/storage.py

  worker-ci:
    name: Worker CI (Node.js)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: worker/package-lock.json

      - name: Install Dependencies
        working-directory: worker
        run: npm ci

      - name: Verify JavaScript Syntax
        working-directory: worker
        run: |
          node --check index.js db.js transcribe.js summarize.js

  frontend-ci:
    name: Frontend CI (React & Vite)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        working-directory: frontend
        run: npm ci

      - name: Verify Linter Check
        working-directory: frontend
        run: npm run lint

      - name: Build Production Bundle
        working-directory: frontend
        run: npm run build
