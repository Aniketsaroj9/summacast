version: '3.8'

services:
  db:
    image: postgres:15
    container_name: summacast_db
    environment:
      POSTGRES_USER: summacast_user
      POSTGRES_PASSWORD: summacast_password
      POSTGRES_DB: summacast
    ports:
      - "5432:5432"
    volumes:
      - summacast_db_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: summacast_redis
    ports:
      - "6379:6379"
    volumes:
      - summacast_redis_data:/data
    restart: unless-stopped

volumes:
  summacast_db_data:
  summacast_redis_data:
